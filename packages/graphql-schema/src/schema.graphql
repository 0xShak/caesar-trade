# Query (50 ops + health)
# --------------------------------------------------------------------------- #

type Query {
  health: String!

  homeMarkets(limit: Int, sortBy: String, status: MarketStatus, filterInput: MarketFiltersInput): MarketConnection
  markets(
    limit: Int
    offset: Int
    sortBy: String
    sortOrder: String
    search: String
    filterInput: MarketFiltersInput
    bookmarked: Boolean
    marketIds: [ID!]
  ): MarketConnection
  market(id: ID, platform: Platform, slug: String): Market
