# ============================================================================
# Caesar Terminal — GraphQL contract (Phase 0)
#
# Source of truth: /root/parity-study/dossier-graphql-schema.md (verbatim
# recovered Parity schema) + Caesar-terminal.html §4. This is the Phase 0
# *contract*: the full operation surface (50 queries, 29 mutations, 6
# subscriptions) is declared so clients can be generated and typed, but only a
# handful of resolvers are wired in Phase 0. Every root Query/Mutation field
# therefore returns a NULLABLE type so unimplemented operations resolve to null
# rather than erroring. Money fields are microdollars: declared as Float where
# the dossier shows Float (*Microdollars), otherwise String.
# ============================================================================

scalar DateTime
scalar JSON

# --------------------------------------------------------------------------- #
# Enums (confirmed literals — dossier §2)
# --------------------------------------------------------------------------- #

enum Platform {
  polymarket
  kalshi
}

enum OrderSide {
  BUY
  SELL
}

# ITrade.side / placeOrder side at the API layer use the same uppercase set.
enum TradeSide {
  BUY
  SELL
}

enum OrderType {
  limit
  market
}

enum OrderExecutionType {
  GTC
  GTD
  FOK
}

enum MarketStatus {
  active
  LIVE
  OPEN
  CLOSED
  RESOLVED
  PENDING
  MATCHED
}

enum OutcomeResult {
  YES
  NO
}

enum PositionStatus {
  OPEN
  CLOSED
  RESOLVED
}

enum SavedFilterScope {
  MARKETS
  TRADERS
}

enum StrategyType {
  TWAP
  DCA
  SCALE
}

